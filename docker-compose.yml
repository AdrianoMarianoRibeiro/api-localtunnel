services:
  api-localtunnel-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-localtunnel-app
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-3337}
      TUNNEL_ENABLED: ${TUNNEL_ENABLED:-true}
      TUNNEL_PROVIDER: ${TUNNEL_PROVIDER:-cloudflare}
      TUNNEL_PORT: ${TUNNEL_PORT:-3337}
      TUNNEL_SUBDOMAIN: ${TUNNEL_SUBDOMAIN:-api-local}
      TUNNEL_HOST: ${TUNNEL_HOST:-https://localtunnel.me}
      TUNNEL_STRICT_SUBDOMAIN: ${TUNNEL_STRICT_SUBDOMAIN:-true}
      # cloudflared
      CLOUDFLARED_HOSTNAME: ${CLOUDFLARED_HOSTNAME:-}
      CLOUDFLARED_TOKEN: ${CLOUDFLARED_TOKEN:-}
      CLOUDFLARED_BINARY: ${CLOUDFLARED_BINARY:-/usr/local/bin/cloudflared}
    ports:
      - "${APP_PORT:-3337}:${APP_PORT:-3337}"
    networks:
      - localtunnel-net
    restart: unless-stopped

  # --- Tunnel sidecar (cloudflared) ---
  tunnel:
    build:
      context: .
      dockerfile: Dockerfile.tunnel
    container_name: api-localtunnel-tunnel
    depends_on:
      - api-localtunnel-app
    environment:
      TUNNEL_PROVIDER: ${TUNNEL_PROVIDER:-cloudflare}
      TUNNEL_LOCAL_HOST: api-localtunnel-app
      TUNNEL_PORT: ${TUNNEL_PORT:-3337}
      TUNNEL_SUBDOMAIN: ${TUNNEL_SUBDOMAIN:-api-local}
      TUNNEL_HOST: ${TUNNEL_HOST:-https://localtunnel.me}
      # cloudflared
      CLOUDFLARED_HOSTNAME: ${CLOUDFLARED_HOSTNAME:-}
      CLOUDFLARED_TOKEN: ${CLOUDFLARED_TOKEN:-}
    networks:
      - localtunnel-net
    restart: unless-stopped

networks:
  localtunnel-net:
    driver: bridge
